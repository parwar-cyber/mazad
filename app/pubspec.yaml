name: mazad
description: "Iraq's most trusted auction marketplace — Flutter app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State + routing (ADR-0001)
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.7

  # Backend
  supabase_flutter: ^2.5.6
  dio: ^5.5.0+1

  # System info (for App-Version header)
  package_info_plus: ^8.0.2

  # Locale-aware formatting
  intl: ^0.20.2

  # Fonts (Inter + Vazirmatn — see ADR-0005 / ADR-0006)
  google_fonts: ^6.2.1

  # Launch store URLs from ForceUpdateScreen
  url_launcher: ^6.3.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true
  generate: true  # enables flutter gen-l10n from l10n.yaml
